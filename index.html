<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="style.css">
        <link
        rel="stylesheet"
        href="https://pro.fontawesme.com/release/v5.10.0/css/all.css"
        />
    </head>
    <body>
        <div id="main">
            <div id="image">
                <img src="google-text.png" alt="A picture of google">
            </div>
        <form action="https://www.google.com/search">
            <input type="text" name="q">
            <input type="submit" value="Google Search">
            <div id="input-field">
                <i class="fa fas search">
                </i>
            </div>
            <div id="button">
                <input type="submit" value="Google Search">
                <input type="submit" value="I'm Feeling Lucky...">
            </div>
        </form>
        <header class="head">
            <div id="links">
                <a href="GoogleImage.html">Image Search</a>
                <a href="GoogleAdvanced.html">Advanced Search</a>
            </div>
        </header>
    </body>
    </html>
