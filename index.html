<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="style.css">
        <link
        rel="stylesheet"
        href="https://pro.fontawesme.com/release/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb32cuHt0A93w35dYTsvhLPVnYs9eStHfGJvKxV"
        crossorigin="anonymous"
        />
    </head>
    <body>
        <header class="head">
            <div id="links">
                <a href="GoogleImage.html">Image Search</a>
                <a href="GoogleAdvanced.html">Advanced Search</a>
            </div>
        </header>
        <div id="main">
            <div id="image">
                <img src="google-text.png" alt="Google">
            </div>
        <form action="https://www.google.com/search">
            <div id="input-field">
                <i class="fa fas search">
                </i>
            <input type="text" name="q">
            <input type="submit" value="Google Search">
            </div>
            <div id="button">
                <input type="submit" value="Google Search">
                <input type="submit" value="I'm Feeling Lucky...">
            </div>
        </form>            
    </body>
